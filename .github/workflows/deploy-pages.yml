name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-qiuyuan-blog-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Cloudflare Pages output
        run: npm run build:pages

      - name: Debug token length
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "Token length: ${#CLOUDFLARE_API_TOKEN}, first4: ${CLOUDFLARE_API_TOKEN:0:4}, last4: ${CLOUDFLARE_API_TOKEN: -4}"

      - name: Deploy to Cloudflare Pages (main)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4.69.0 pages deploy .vercel/output/static --project-name=qiuyuan-blog --branch=main
